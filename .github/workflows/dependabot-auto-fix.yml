name: Dependabot Auto-Fix

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  auto-fix-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run dependency audit and fix
        id: audit-fix
        continue-on-error: true
        run: |
          echo "Running pnpm audit..."
          pnpm audit --json > audit-before.json || true

          echo "Running pnpm audit --fix..."
          pnpm audit --fix || true

          echo "Running pnpm install to update lock file..."
          pnpm install --no-frozen-lockfile

          pnpm audit --json > audit-after.json || true

      - name: Run custom fix script
        run: |
          node scripts/fix-dependabot-issues.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit --no-verify -m "fix: auto-resolve dependency security issues

          - Applied pnpm audit --fix
          - Updated dependencies with security patches
          - Generated by dependabot-auto-fix workflow"
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## Dependency Fix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          cat audit-after.json 2>/dev/null || echo "No audit data available" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f dependency-fix-report.md ]; then
            cat dependency-fix-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            audit-before.json
            audit-after.json
            dependency-fix-report.md
          retention-days: 30
